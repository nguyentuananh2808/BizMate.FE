<nav class="bottom-nav" aria-label="Điều hướng nhanh">
  <a
    *ngFor="let item of menuItems"
    [routerLink]="item.url"
    (click)="setActive(item.id)"
    class="bottom-nav__item"
    [class.bottom-nav__item--active]="active === item.id"
    [class.bottom-nav__item--accent]="item.accent"
    [attr.aria-current]="active === item.id ? 'page' : null"
    [attr.aria-label]="item.label"
  >
    <span class="bottom-nav__icon">
      <i nz-icon [nzType]="item.icon" nzTheme="outline"></i>
    </span>
    <span class="bottom-nav__label">{{ item.label }}</span>
  </a>
</nav>
