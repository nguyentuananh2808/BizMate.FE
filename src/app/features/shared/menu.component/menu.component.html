<button
  *ngIf="isMobile && !isMobileMenuOpen"
  class="sidebar-mobile-trigger"
  (click)="openMobileMenu()"
  aria-label="Mở menu"
>
  <img src="assets/images/logo_vuakong.png" alt="" />
</button>

<div
  *ngIf="isMobile && isMobileMenuOpen"
  class="sidebar-overlay"
  (click)="closeMobileMenu()"
></div>

<aside
  class="sidebar-shell"
  [ngClass]="{
    'sidebar-mobile': isMobile,
    'translate-x-0': isMobile && isMobileMenuOpen,
    '-translate-x-full': isMobile && !isMobileMenuOpen,
    'sidebar-collapsed': isCollapsed && !isMobile,
    'sidebar-expanded': !isCollapsed && !isMobile,
    'sidebar-light': !isDark,
    'sidebar-dark': isDark
  }"
>
  <div class="sidebar-top">
    <button
      class="brand-button"
      (click)="isMobile ? closeMobileMenu() : toggleSidebar()"
      [attr.aria-label]="isCollapsed ? 'Mở rộng sidebar' : 'Thu gọn sidebar'"
    >
      <img
        src="assets/images/logo_print_vuakong.png"
        alt=""
      />
    </button>

    <div *ngIf="!isCollapsed" class="brand-copy">
      <span class="brand-kicker">BizMate</span>
      <strong>VuaKong</strong>
    </div>

    <button
      *ngIf="!isMobile"
      class="collapse-button"
      (click)="toggleSidebar()"
      [attr.aria-label]="isCollapsed ? 'Mở rộng sidebar' : 'Thu gọn sidebar'"
    >
      <i nz-icon [nzType]="isCollapsed ? 'menu-unfold' : 'menu-fold'"></i>
    </button>
  </div>

  <nav class="sidebar-nav" aria-label="Menu chính">
    <section *ngFor="let section of menuSections" class="nav-section">
      <ng-container *ngFor="let item of section.items">
        <div class="nav-parent" *ngIf="item.children; else singleItem">
          <button
            class="nav-item"
            [ngClass]="{
              active: isExpanded(item.key) || isActive(item)
            }"
            (click)="toggleExpand(item.key)"
            [attr.title]="isCollapsed ? item.label : null"
          >
            <span class="nav-icon">
              <i nz-icon [nzType]="item.icon"></i>
            </span>
            <span *ngIf="!isCollapsed" class="nav-label">{{ item.label }}</span>
            <i
              *ngIf="!isCollapsed"
              class="nav-chevron"
              nz-icon
              [nzType]="isExpanded(item.key) ? 'down' : 'right'"
            ></i>
          </button>

          <div
            *ngIf="isExpanded(item.key) && !isCollapsed"
            class="nav-children"
          >
            <button
              *ngFor="let child of item.children"
              class="nav-child"
              [ngClass]="{ active: isActive(child) }"
              (click)="handleClick(child.route, child.key)"
            >
              <i nz-icon [nzType]="child.icon || 'right'"></i>
              <span>{{ child.label }}</span>
            </button>
          </div>
        </div>

        <ng-template #singleItem>
          <button
            class="nav-item"
            [ngClass]="{ active: isActive(item) }"
            (click)="handleClick(item.route, item.key)"
            [attr.title]="isCollapsed ? item.label : null"
          >
            <span class="nav-icon">
              <i nz-icon [nzType]="item.icon"></i>
            </span>
            <span *ngIf="!isCollapsed" class="nav-label">{{ item.label }}</span>
          </button>
        </ng-template>
      </ng-container>
    </section>
  </nav>

  <div class="sidebar-footer">
    <dark-mode-toggle></dark-mode-toggle>
  </div>
</aside>
